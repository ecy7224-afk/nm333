<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국세청 뉴스 모니터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--border:#ddd9d0;--border2:#ccc8be;
  --text:#1a1916;--text2:#6b6760;--text3:#9e9b95;
  --accent:#c0392b;--accent2:#2c5f8a;--accent3:#1e7c50;
  --flag-bg:#fff5f5;--flag-border:#f5c6c6;
  --serif:'Noto Serif KR',serif;--mono:'JetBrains Mono',monospace;--sans:'Nanum Gothic',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
header{background:var(--text);color:#f5f3ee;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--serif);font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px}
.logo-mark{width:22px;height:22px;border-radius:3px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:var(--mono)}
.header-r{display:flex;align-items:center;gap:12px}
.clock{font-family:var(--mono);font-size:11px;color:#888}
.fetch-btn{background:transparent;border:1px solid #555;color:#ccc;padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s;display:flex;align-items:center;gap:5px}
.fetch-btn:hover{border-color:#fff;color:#fff}
.fetch-btn:disabled{opacity:.4;cursor:not-allowed}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}

.wrap{max-width:1160px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:250px 1fr;gap:24px;align-items:start}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.pt{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pt::after{content:'';flex:1;height:1px;background:var(--border)}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.sn{font-size:12px;color:var(--text2)}
.sv{font-family:var(--mono);font-size:18px;font-weight:500}
.sv.red{color:var(--accent)}.sv.blue{color:var(--accent2)}

.f-list{display:flex;flex-direction:column;gap:3px}
.f-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:5px;cursor:pointer;font-size:12px;border:1px solid transparent;transition:background .15s}
.f-item:hover{background:var(--surface2)}
.f-item.active{background:var(--text);color:#f5f3ee}
.f-item.flag-active{background:var(--flag-bg);border-color:var(--accent);color:var(--accent)}
.fd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fd.all{background:var(--text3)}.fd.major{background:var(--accent2)}.fd.internet{background:#e08030}.fd.gov{background:var(--accent3)}.fd.flagged{background:var(--accent)}
.fc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3)}
.f-item.active .fc,.f-item.flag-active .fc{color:inherit;opacity:.6}

/* 사실확인 패널 */
.flag-panel{border-color:var(--flag-border);background:var(--flag-bg)}
.flag-panel .pt{color:var(--accent)}
.flag-panel .pt::after{background:var(--flag-border)}
.flag-item{padding:9px 0;border-bottom:1px solid var(--flag-border);cursor:pointer}
.flag-item:last-child{border-bottom:none}
.flag-item:hover .fi-title{color:var(--accent)}
.fi-source{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:3px}
.fi-title{font-size:12px;color:var(--text);line-height:1.5;font-weight:700;transition:color .15s}
.fi-reason{font-size:11px;color:#a03030;margin-top:4px;line-height:1.5}

/* 상태바 */
.status-bar{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.s-dot.live{background:var(--accent3);animation:blink 2s ease-in-out infinite}
.s-dot.busy{background:var(--accent);animation:blink .5s ease-in-out infinite}
.s-dot.err{background:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.s-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3)}

.loading-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;text-align:center;color:var(--text2);display:none}
.loading-box.show{display:block}
.loading-icon{font-size:26px;display:inline-block;margin-bottom:8px}

/* 날짜 섹션 헤더 */
.date-section{margin-bottom:24px}
.date-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:12px;
}
.date-badge{
  font-family:var(--mono);font-size:11px;font-weight:500;
  padding:4px 12px;border-radius:4px;white-space:nowrap;
}
.date-badge.today{
  background:var(--text);color:#f5f3ee;
}
.date-badge.prev{
  background:var(--surface2);color:var(--text2);
  border:1px solid var(--border);
}
.date-count{
  font-family:var(--mono);font-size:10px;color:var(--text3);
}
.date-line{flex:1;height:1px;background:var(--border)}

/* 카드 */
.news-list{display:flex;flex-direction:column;gap:8px}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px;transition:box-shadow .2s,border-color .2s}
.news-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);border-color:var(--border2)}
.news-card.flagged{border-left:3px solid var(--accent);background:var(--flag-bg)}

.ch{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px}
.sb{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px}
.sb.major{background:#e8f0f8;color:var(--accent2)}
.sb.internet{background:#fef3e8;color:#8a4f10}
.sb.gov{background:#e8f5ee;color:var(--accent3)}
.src-name{font-size:12px;font-weight:700;color:var(--text2)}
.rel{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px}
.rel.high{background:#e8f5ee;color:var(--accent3)}
.rel.mid{background:#fff8e6;color:#7a5f00}
.rel.low{background:var(--flag-bg);color:var(--accent)}
.src-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}

.card-title{font-family:var(--serif);font-size:14px;font-weight:700;line-height:1.5;margin-bottom:7px;color:var(--text)}
.card-summary{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:9px}

.url-bar{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:5px 10px;margin-bottom:9px;overflow:hidden}
.url-label{font-family:var(--mono);font-size:9px;color:var(--text3);flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.url-text{font-family:var(--mono);font-size:10px;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-decoration:none}
.url-text:hover{text-decoration:underline}
.url-copy{background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;padding:0 3px;flex-shrink:0;font-family:var(--sans)}
.url-copy:hover{color:var(--accent2)}

.flag-box{background:#fff0f0;border:1px solid var(--flag-border);border-radius:5px;padding:8px 11px;margin-bottom:9px}
.flag-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--accent);margin-bottom:3px}
.flag-text{font-size:11px;color:#a03030;line-height:1.55}

.card-footer{display:flex;align-items:center;gap:7px}
.orig-btn{font-size:11px;color:var(--accent2);text-decoration:none;border:1px solid #c0d0e0;padding:3px 9px;border-radius:4px;transition:all .15s}
.orig-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.empty{text-align:center;padding:50px;color:var(--text3);display:none}
.empty.show{display:block}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-mark">NTS</div>국세청 뉴스 모니터</div>
  <div class="header-r">
    <span class="clock" id="clock"></span>
    <button class="fetch-btn" id="fetch-btn" onclick="fetchNews()">
      <span id="fi">↻</span> 뉴스 가져오기
    </button>
  </div>
</header>

<div class="wrap">
  <aside>
    <div class="panel">
      <div class="pt">현황</div>
      <div class="stat-row"><span class="sn">전체 기사</span><span class="sv" id="s-total">—</span></div>
      <div class="stat-row"><span class="sn">오늘 기사</span><span class="sv blue" id="s-today">—</span></div>
      <div class="stat-row"><span class="sn">⚠ 사실확인 필요</span><span class="sv red" id="s-flag">—</span></div>
    </div>

    <div class="panel">
      <div class="pt">필터</div>
      <div class="f-list">
        <div class="f-item active" onclick="setFilter('all',this)"><span class="fd all"></span>전체<span class="fc" id="fc-all">0</span></div>
        <div class="f-item" onclick="setFilter('major',this)"><span class="fd major"></span>주요 언론사<span class="fc" id="fc-major">0</span></div>
        <div class="f-item" onclick="setFilter('internet',this)"><span class="fd internet"></span>인터넷 매체<span class="fc" id="fc-internet">0</span></div>
        <div class="f-item" onclick="setFilter('gov',this)"><span class="fd gov"></span>공식 보도자료<span class="fc" id="fc-gov">0</span></div>
        <div class="f-item" onclick="setFilter('flagged',this)"><span class="fd flagged"></span>⚠ 사실확인 필요<span class="fc" id="fc-flag">0</span></div>
      </div>
    </div>

    <div class="panel flag-panel" id="flag-panel" style="display:none">
      <div class="pt">⚠ 사실확인 필요</div>
      <div id="flag-list"></div>
    </div>

    <div class="panel">
      <div class="pt">자동 갱신</div>
      <p style="font-size:11px;color:var(--text2);line-height:1.8">
        Apps Script → ⏰ 트리거<br>
        → <b>fetchAndSave</b> → 1시간마다<br><br>
        <span style="color:var(--text3)">검색어 추가: QUERIES 배열에 직접 입력</span>
      </p>
    </div>
  </aside>

  <main>
    <div class="status-bar">
      <div class="s-dot" id="s-dot"></div>
      <span id="s-msg">"뉴스 가져오기"를 눌러 최신 기사를 불러오세요.</span>
      <span class="s-time" id="s-time"></span>
    </div>

    <div class="loading-box" id="loading-box">
      <div class="loading-icon spin">⟳</div>
      <div>뉴스 불러오는 중...</div>
    </div>

    <div id="news-container"></div>
    <div class="empty" id="empty">해당하는 기사가 없습니다.</div>
  </main>
</div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/ecy7224-afk/nm333/main/news.json';

// ── 시계 ─────────────────────────────────────────────
function tick(){
  const n=new Date(),d=['일','월','화','수','목','금','토'][n.getDay()];
  document.getElementById('clock').textContent=
    `${n.getMonth()+1}/${n.getDate()}(${d}) ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
tick(); setInterval(tick,1000);

// ── 날짜 처리 ────────────────────────────────────────
function toDateStr(pubDate){
  // 네이버 API 날짜: "Mon, 23 Mar 2026 09:00:00 +0900" 형식
  try{
    const d=new Date(pubDate);
    if(isNaN(d.getTime()))return null;
    // 한국 시간 기준 날짜
    const kst=new Date(d.getTime()+9*60*60*1000);
    return `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,'0')}-${String(kst.getUTCDate()).padStart(2,'0')}`;
  }catch{return null;}
}

function todayStr(){
  const now=new Date();
  const kst=new Date(now.getTime()+9*60*60*1000);
  return `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,'0')}-${String(kst.getUTCDate()).padStart(2,'0')}`;
}

function fmtDateLabel(dateStr){
  const [y,m,d]=dateStr.split('-');
  const date=new Date(`${dateStr}T00:00:00+09:00`);
  const days=['일','월','화','수','목','금','토'];
  return `${parseInt(m)}월 ${parseInt(d)}일 (${days[date.getDay()]})`;
}

function fmtTime(pubDate){
  try{
    const d=new Date(pubDate);
    if(isNaN(d.getTime()))return pubDate||'—';
    const kst=new Date(d.getTime()+9*60*60*1000);
    return `${String(kst.getUTCHours()).padStart(2,'0')}:${String(kst.getUTCMinutes()).padStart(2,'0')}`;
  }catch{return pubDate||'—';}
}

// ── 오보 패턴 ────────────────────────────────────────
const FLAG_RE=[
  {re:/전면\s*(중단|폐지|금지)/,r:'극단적 표현 — 공식 발표 없이 "전면 중단/폐지" 표현 사용'},
  {re:/단독.{0,10}(폭로|충격|경악)/,r:'단독+충격성 — 교차 검증이 필요한 단독 보도'},
  {re:/수천\s*명|수만\s*명/,r:'불확실한 수치 — 구체적 근거 없는 대규모 수치 사용'},
  {re:/국세청\s*(해체|폐지|통폐합)/,r:'기관 폐지 — 공식 발표 없는 기관 개편 보도'},
  {re:/비밀리에|몰래|은밀히/,r:'익명/비공개 출처 — 공식 확인이 어려운 표현 사용'},
  {re:/단독\s*보도|단독\s*입수/,r:'단독 보도 — 다른 언론사 교차 확인이 필요합니다'},
];
const MAJOR=[
  'yna.co.kr','yonhapnews','chosun.com','joongang.co.kr','donga.com',
  'hani.co.kr','khan.co.kr','hankyung.com','mk.co.kr','sedaily.com',
  'kbs.co.kr','mbc.co.kr','sbs.co.kr','ytn.co.kr','jtbc.co.kr',
  'news1.kr','newsis.com','seoul.co.kr','munhwa.com','kmib.co.kr',
  'heraldcorp.com','fnnews.com','edaily.co.kr','inews24.com','etnews.com'
];
function srcType(url){
  const c=url.toLowerCase();
  if(c.includes('nts.go.kr')||c.includes('moef.go.kr')||c.includes('.go.kr'))return'gov';
  if(MAJOR.some(d=>c.includes(d)))return'major';
  return'internet';
}
function relBadge(type,flagged){
  if(flagged)return'low';
  if(type==='gov'||type==='major')return'high';
  return'mid';
}
function checkFlag(title,desc){
  const t=title+' '+desc;
  for(const p of FLAG_RE)if(p.re.test(t))return{flagged:true,reason:p.r};
  return{flagged:false,reason:''};
}
function strip(s){
  return(s||'').replace(/<[^>]+>/g,'').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&#039;/g,"'").trim();
}
function getDomain(url){
  try{return new URL(url).hostname.replace('www.','');}catch{return'—';}
}

// ── 뉴스 가져오기 ────────────────────────────────────
let allNews=[];
let currentFilter='all';

async function fetchNews(){
  const btn=document.getElementById('fetch-btn');
  const fi=document.getElementById('fi');
  const lb=document.getElementById('loading-box');
  const sDot=document.getElementById('s-dot');
  const sMsg=document.getElementById('s-msg');

  btn.disabled=true;fi.textContent='⟳';fi.classList.add('spin');
  lb.classList.add('show');
  document.getElementById('news-container').innerHTML='';
  document.getElementById('empty').classList.remove('show');
  sDot.className='s-dot busy';sMsg.textContent='뉴스 불러오는 중...';
  allNews=[];

  try{
    const res=await fetch(JSON_URL+'?t='+Date.now());
    if(!res.ok)throw new Error('fetch 실패 '+res.status);
    const data=await res.json();
    const items=data.items||[];
    const updated=data.updated?new Date(data.updated):null;

    const seen=new Set();
    items.forEach(it=>{
      const title=strip(it.title||'');
      if(!title||seen.has(title))return;
      seen.add(title);
      const desc=strip(it.description||'');
      const url=it.originallink||it.link||'#';
      const type=srcType(url);
      const {flagged,reason}=checkFlag(title,desc);
      const dateStr=toDateStr(it.pubDate);
      allNews.push({
        title,
        summary:desc.slice(0,140)+(desc.length>140?'…':''),
        url,source:getDomain(url),
        time:fmtTime(it.pubDate),
        pubDate:it.pubDate,
        dateStr,
        sourceType:type,flagged,flagReason:reason,
        reliability:relBadge(type,flagged),
      });
    });

    const now=new Date();
    sDot.className='s-dot live';
    sMsg.textContent=`${allNews.length}개 기사 로드 완료`;
    document.getElementById('s-time').textContent=
      updated
        ? `수집: ${updated.getMonth()+1}/${updated.getDate()} ${String(updated.getHours()).padStart(2,'0')}:${String(updated.getMinutes()).padStart(2,'0')}`
        : `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;

    updateStats();
    renderFlagPanel();
    renderCards();

  }catch(e){
    console.error(e);
    sDot.className='s-dot err';
    sMsg.textContent='뉴스를 가져오지 못했습니다. 잠시 후 다시 시도해 주세요.';
  }finally{
    lb.classList.remove('show');
    btn.disabled=false;fi.classList.remove('spin');fi.textContent='↻';
  }
}

// ── 사실확인 패널 ────────────────────────────────────
function renderFlagPanel(){
  const panel=document.getElementById('flag-panel');
  const list=document.getElementById('flag-list');
  const flagged=allNews.filter(a=>a.flagged);
  if(!flagged.length){panel.style.display='none';return;}
  panel.style.display='block';
  list.innerHTML=flagged.map(a=>`
    <div class="flag-item" onclick="scrollToCard('${encodeURIComponent(a.title)}')">
      <div class="fi-source">${a.source} · ${a.time}</div>
      <div class="fi-title">${a.title}</div>
      <div class="fi-reason">${a.flagReason}</div>
    </div>`).join('');
}

function scrollToCard(encodedTitle){
  const title=decodeURIComponent(encodedTitle);
  // 전체 필터로 전환 후 스크롤
  if(currentFilter!=='all'){
    setFilter('all',document.querySelector('.f-item'));
    setTimeout(()=>doScroll(title),300);
  } else {
    doScroll(title);
  }
}
function doScroll(title){
  const cards=document.querySelectorAll('.news-card');
  for(const card of cards){
    if(card.dataset.title===title){
      card.scrollIntoView({behavior:'smooth',block:'center'});
      card.style.outline='2px solid var(--accent)';
      setTimeout(()=>card.style.outline='',2000);
      return;
    }
  }
}

// ── 통계 & 필터 ───────────────────────────────────────
function updateStats(){
  const today=todayStr();
  document.getElementById('s-total').textContent=allNews.length;
  document.getElementById('s-today').textContent=allNews.filter(a=>a.dateStr===today).length;
  document.getElementById('s-flag').textContent=allNews.filter(a=>a.flagged).length;
  document.getElementById('fc-all').textContent=allNews.length;
  document.getElementById('fc-major').textContent=allNews.filter(a=>a.sourceType==='major').length;
  document.getElementById('fc-internet').textContent=allNews.filter(a=>a.sourceType==='internet').length;
  document.getElementById('fc-gov').textContent=allNews.filter(a=>a.sourceType==='gov').length;
  document.getElementById('fc-flag').textContent=allNews.filter(a=>a.flagged).length;
}
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.f-item').forEach(x=>x.classList.remove('active','flag-active'));
  el.classList.add(f==='flagged'?'flag-active':'active');
  renderCards();
}

// ── 렌더링 ───────────────────────────────────────────
function renderCards(){
  const container=document.getElementById('news-container');
  const empty=document.getElementById('empty');
  container.innerHTML='';

  let filtered=allNews;
  if(currentFilter==='flagged') filtered=allNews.filter(a=>a.flagged);
  else if(currentFilter!=='all') filtered=allNews.filter(a=>a.sourceType===currentFilter);

  if(!filtered.length){empty.classList.add('show');return;}
  empty.classList.remove('show');

  const today=todayStr();

  // 날짜별 그룹핑
  const groups={};
  filtered.forEach(a=>{
    const key=a.dateStr||'날짜 미상';
    if(!groups[key])groups[key]=[];
    groups[key].push(a);
  });

  // 날짜 내림차순 정렬
  const sortedDates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  sortedDates.forEach(dateStr=>{
    const articles=groups[dateStr];
    // 각 날짜 안에서 플래그 → 나머지 순 정렬
    articles.sort((a,b)=>(b.flagged?1:0)-(a.flagged?1:0));

    const isToday=dateStr===today;
    const section=document.createElement('div');
    section.className='date-section';

    // 날짜 헤더
    const label=isToday
      ? `오늘 · ${fmtDateLabel(dateStr)}`
      : fmtDateLabel(dateStr);

    section.innerHTML=`
      <div class="date-header">
        <span class="date-badge ${isToday?'today':'prev'}">${label}</span>
        <span class="date-count">${articles.length}건</span>
        <div class="date-line"></div>
      </div>
      <div class="news-list" id="list-${dateStr}"></div>
    `;
    container.appendChild(section);

    const list=section.querySelector(`#list-${dateStr}`);
    articles.forEach(a=>list.appendChild(buildCard(a)));
  });
}

function buildCard(a){
  const tl={major:'주요 언론',internet:'인터넷 매체',gov:'공식 자료'};
  const rl={high:'신뢰 높음',mid:'보통',low:'확인 필요'};
  const cls=['news-card',a.flagged?'flagged':''].filter(Boolean).join(' ');
  const safeUrl=a.url&&a.url!=='#';
  const urlBar=safeUrl?`
    <div class="url-bar">
      <span class="url-label">URL</span>
      <a class="url-text" href="${a.url}" target="_blank" title="${a.url}">${a.url}</a>
      <button class="url-copy" onclick="cpUrl(this,'${a.url.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">복사</button>
    </div>`:'';
  const flagHtml=a.flagged?`
    <div class="flag-box">
      <div class="flag-label">⚠ 사실확인 필요</div>
      <div class="flag-text">${a.flagReason}</div>
    </div>`:'';

  const d=document.createElement('div');
  d.innerHTML=`<div class="${cls}" data-title="${a.title.replace(/"/g,'&quot;')}">
    <div class="ch">
      <span class="sb ${a.sourceType}">${tl[a.sourceType]||a.sourceType}</span>
      <span class="src-name">${a.source}</span>
      <span class="rel ${a.reliability}">${rl[a.reliability]||''}</span>
      <span class="src-time">${a.time}</span>
    </div>
    <div class="card-title">${a.title}</div>
    <div class="card-summary">${a.summary}</div>
    ${urlBar}${flagHtml}
    <div class="card-footer">
      ${safeUrl?`<a href="${a.url}" target="_blank" class="orig-btn">원문 보기 →</a>`:''}
    </div>
  </div>`;
  return d.firstElementChild;
}

function cpUrl(btn,url){
  navigator.clipboard.writeText(url).then(()=>{
    const o=btn.textContent;btn.textContent='✓';
    setTimeout(()=>btn.textContent=o,1500);
  });
}
</script>
